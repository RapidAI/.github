name: Sync RapidOcrCpp
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Gitee → GitHub
        uses: Yikun/hub-mirror-action@master
        with:
          src: gitee/RapidAI
          dst: github/RapidAI
          static_list: RapidOcrCpp
          # 只用 token，不用 SSH 密钥
          dst_token: ${{ secrets.GITHUB_TOKEN }}
          account_type: org
          force_update: true
